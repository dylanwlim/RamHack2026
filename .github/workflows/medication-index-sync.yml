name: Sync medication index

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild medication index snapshot
        run: npm run medications:sync

      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- data/medication-index.snapshot.json.gz; then
            echo "Medication snapshot already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/medication-index.snapshot.json.gz
          git commit -m "chore: refresh medication index snapshot"
          git push
